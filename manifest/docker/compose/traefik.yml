# Traefik 反向代理网关
# 职责：接收外部流量，根据 Docker label 自动发现后端服务并路由。
# 蓝绿部署中通过 Traefik 的健康检查（/health/lb）自动摘除不健康的后端。
# 网络：创建 app-network，blue/green 容器以 external 方式加入。
name: ${APP_NAME:-server-go}

services:
    traefik:
        # 使用官方 Traefik 镜像（latest）
        image: traefik
        container_name: ${APP_NAME:-server-go}-gateway
        restart: unless-stopped
        command:
            # 启用 API（dashboard 依赖）
            - --api=${TRAEFIK_API_ENABLED:-true}
            # 启用 Web Dashboard
            - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-true}
            # 业务流量入口
            - --entrypoints.web.address=:${GATEWAY_INTERNAL_PORT:-7001}
            # Dashboard/API 入口
            - --entrypoints.traefik.address=:8080
            # 启用 Docker 服务发现
            - --providers.docker=true
            - --providers.docker.endpoint=unix:///var/run/docker.sock
            # 仅暴露带 traefik.enable=true 的容器
            - --providers.docker.exposedbydefault=false
            # 指定服务发现网络
            - --providers.docker.network=${APP_NAME:-server-go}-network
            - --providers.docker.constraints=Label(`traefik.enable`,`true`)
            # 启用访问日志
            - --accesslog=true
            - --accesslog.format=${TRAEFIK_ACCESSLOG_FORMAT:-json}
            - --log.level=INFO
            # 启用 /ping 端点（healthcheck 依赖）
            - --ping=true
        ports:
            # 业务流量端口映射
            - '${HOST_GATEWAY_PORT:-7001}:${GATEWAY_INTERNAL_PORT:-7001}'
            # Dashboard 端口映射
            - '${TRAEFIK_DASHBOARD_PORT:-18080}:8080'
        volumes:
            # Docker socket（只读，用于服务发现）
            - /var/run/docker.sock:/var/run/docker.sock:ro
        logging:
            driver: json-file
            options:
                # 单个日志文件最大 20MB
                max-size: 20m
                # 最多保留 5 个日志文件
                max-file: '5'
        healthcheck:
            # 通过 ping 端点检查健康
            test: ['CMD', 'traefik', 'healthcheck', '--ping']
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 10s
        # Dashboard 路由配置（通过 label 自注册）
        labels:
            - traefik.enable=true
            - traefik.docker.network=${APP_NAME:-server-go}-network
            - traefik.http.routers.${APP_NAME:-server-go}-dashboard.entrypoints=traefik
            - "traefik.http.routers.${APP_NAME:-server-go}-dashboard.rule=PathPrefix(`/api`) || PathPrefix(`/dashboard`)"
            - traefik.http.routers.${APP_NAME:-server-go}-dashboard.priority=1000
            - traefik.http.routers.${APP_NAME:-server-go}-dashboard.service=api@internal
        networks:
            - app-network

# 网络由此文件创建，blue/green 以 external: true 引用
networks:
    app-network:
        name: ${APP_NAME:-server-go}-network