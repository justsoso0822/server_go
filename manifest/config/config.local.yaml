# 本地开发环境配置
# 用于宿主机直接运行: go run main.go

server:
  # HTTP 服务监听地址
  address: ":7001"
  
  # OpenAPI 文档路径
  openapiPath: "/api.json"
  
  # Swagger UI 路径
  swaggerPath: "/swagger"
  
  # 优雅关闭
  graceful: true
  
  # 优雅关闭超时时间（秒）
  gracefulTimeout: 15
  
  # 配置文件路径（GoFrame 自动加载）
  gcfg: "manifest/config/config.local.yaml"

app:
  # 应用密钥，用于加密和签名
  # 生产环境务必修改
  keys:
    - "SzNg8LgHjEUgTAc4"

database:
  default:
    # 数据库连接字符串
    # 容器内使用服务名 mysql:3306，宿主机开发使用 127.0.0.1:330
    link: "mysql:root:root@tcp(mysql:3306)/game_db_1?charset=utf8mb4&parseTime=true&loc=Local"
    
    # 是否开启 SQL 调试日志
    debug: true

redis:
  default:
    # Redis 地址
    # 容器内使用服务名 redis:6379，宿主机开发使用 127.0.0.1:637
    address: "redis:6379"
    
    # Redis 密码
    pass: "root"
    
    # Redis 数据库编号
    db: 0

logger:
  # 日志级别: debug | info | warn | error
  level: "info"
  
  # 输出到标准输出
  stdout: true
  
  # 是否禁用颜色输出
  # false = 带颜色，便于本地开发查看
  stdoutColorDisabled: false