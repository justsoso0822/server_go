# 测试环境配置
# 用于测试服务器部署

server:
  # HTTP 服务监听地址
  address: ":7001"
  
  # 优雅关闭
  graceful: true
  
  # 优雅关闭超时时间（秒）
  gracefulTimeout: 15

app:
  # 应用密钥，用于加密和签名
  # 测试环境请修改此值
  keys:
    - "SzNg8LgHjEUgTAc4"

database:
  default:
    # 数据库连接字符串
    # 连接测试环境的外部数据库
    # 请修改为实际的数据库地址、用户名和密码
    link: "mysql:root:change_me@tcp(172.17.0.14:3306)/game_db_1?charset=utf8mb4&parseTime=true&loc=Local"
    
    # 是否开启 SQL 调试日志
    # 测试环境建议关闭
    debug: false
    
    # 最大空闲连接数
    maxIdle: 10
    # 最大打开连接数，不能超过 MySQL max_connections / 实例数
    maxOpen: 100
    # 连接最大存活时间（秒），建议小于 MySQL wait_timeout（默认 28800）
    maxLifetime: 3600

redis:
  default:
    # Redis 地址
    # 连接测试环境的外部 Redis
    # 请修改为实际的 Redis 地址
    address: "172.17.25.15:6379"
    
    # Redis 密码
    # 请修改为实际密码
    pass: "change_me"
    
    # Redis 数据库编号
    db: 20

logger:
  # 日志级别
  level: "info"
  
  # 输出到标准输出
  stdout: true
  
  # 禁用颜色输出
  # true = 纯文本，便于日志采集
  stdoutColorDisabled: true
  
  # 禁用颜色写入
  writerColorEnable: false
  
  # 日志中包含的上下文键
  # RequestId 用于追踪请求链路
  ctxKeys: ["RequestId"]